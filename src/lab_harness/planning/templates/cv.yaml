# Capacitance-Voltage (CV) characterization template
name: "CV Measurement"
description: "Capacitance-Voltage characterization at multiple frequencies"

x_axis:
  label: "DC Bias Voltage"
  unit: "V"
  start: -40.0
  stop: 40.0
  step: 0.5
  role: "lcr_meter"

y_channels:
  - label: "Capacitance"
    unit: "pF"
    role: "lcr_meter"
  - label: "Dissipation Factor"
    unit: ""
    role: "lcr_meter"

max_voltage_v: 50.0
max_temperature_k: 400.0
settling_time_s: 1.0
num_averages: 1
