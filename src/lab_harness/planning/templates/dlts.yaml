# Deep Level Transient Spectroscopy (DLTS) measurement template
name: "DLTS"
description: "Temperature sweep, measure capacitance transients for deep trap characterization"

x_axis:
  label: "Temperature"
  unit: "K"
  start: 80.0
  stop: 400.0
  step: 2.0
  role: "temperature_controller"

y_channels:
  - label: "DLTS Signal"
    unit: "pF"
    role: "lcr_meter"
  - label: "Capacitance"
    unit: "pF"
    role: "lcr_meter"

max_voltage_v: 10.0
max_temperature_k: 450.0
settling_time_s: 5.0
num_averages: 5
