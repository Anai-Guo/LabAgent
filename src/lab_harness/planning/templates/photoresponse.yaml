# Photoresponse time measurement template
# Time sweep with light on/off pulses, measure current transient
name: "Photoresponse Time"
description: "Measure photocurrent vs time under pulsed illumination for response dynamics"

x_axis:
  label: "Time"
  unit: "s"
  start: 0.0
  stop: 60.0
  step: 0.1
  role: "source_meter"

y_channels:
  - label: "Photocurrent"
    unit: "uA"
    role: "source_meter"

max_current_a: 0.001       # 1 mA compliance
max_voltage_v: 10.0
settling_time_s: 0.01       # Fast sampling for transient response
num_averages: 1
