<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680">
  <defs>
    <linearGradient id="winBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e"/>
      <stop offset="100%" style="stop-color:#151530"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a96e"/>
      <stop offset="100%" style="stop-color:#e8d5a0"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1100" height="680" fill="#1a1a2e"/>

  <!-- Browser window -->
  <g filter="url(#dropShadow)">
    <rect x="30" y="20" width="1040" height="640" rx="10" fill="url(#winBg)" stroke="#c8a96e" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- Title bar -->
    <rect x="30" y="20" width="1040" height="36" rx="10" fill="#0a0a15"/>
    <rect x="30" y="40" width="1040" height="16" fill="#0a0a15"/>
    <circle cx="50" cy="38" r="6" fill="#ff5f57"/>
    <circle cx="70" cy="38" r="6" fill="#febc2e"/>
    <circle cx="90" cy="38" r="6" fill="#28c840"/>
    <rect x="300" y="28" width="500" height="20" rx="4" fill="#1a1a3a"/>
    <text x="312" y="42" font-family="'Segoe UI', monospace" font-size="10" fill="#94a3b8">🔒 localhost:8080/experiment</text>

    <!-- Page header inside browser -->
    <text x="60" y="90" font-family="'Palatino Linotype', Georgia, serif" font-size="22" font-weight="700" fill="#c8a96e">⚗ LabAgent Guided Experiment</text>

    <!-- Left column: Activity log -->
    <rect x="60" y="110" width="310" height="520" rx="8" fill="#151530" stroke="#c8a96e" stroke-width="0.8"/>
    <text x="78" y="135" font-family="'Palatino Linotype', Georgia, serif" font-size="14" font-weight="700" fill="#e8d5a0">⚡ Live Activity</text>

    <!-- Log entries -->
    <g font-family="'Segoe UI', Consolas, monospace" font-size="10.5">
      <!-- Phase header -->
      <text x="78" y="162" fill="#c8a96e" font-weight="700">━━ Literature + instrument scan</text>

      <!-- Literature events -->
      <text x="78" y="184" fill="#c4b5fd">📚 Searching literature...</text>
      <text x="78" y="202" fill="#c4b5fd">📄 Found: Cyclic voltammetry</text>
      <text x="90" y="216" fill="#c4b5fd">    fundamentals (Elgrishi 2018)</text>
      <text x="78" y="234" fill="#c4b5fd">📄 Found: Ferrocene electrochemistry</text>
      <text x="90" y="248" fill="#c4b5fd">    in acetonitrile (Connelly 1996)</text>
      <text x="78" y="266" fill="#c4b5fd">✓ Literature: 5 paper(s)</text>

      <!-- Instruments -->
      <text x="78" y="294" fill="#9cf0ff">🔍 Scanning instruments...</text>
      <text x="78" y="312" fill="#9cf0ff">🔌 BIOLOGIC SP-200 @ USB0::2</text>
      <text x="78" y="330" fill="#9cf0ff">🔌 METTLER XS205 @ COM4</text>
      <text x="78" y="348" fill="#9cf0ff">🔌 ORION A221 @ COM5</text>
      <text x="78" y="366" fill="#9cf0ff">✓ Scan: 3 instrument(s)</text>

      <!-- Classifications -->
      <text x="78" y="394" fill="#7bc639">✓ SP-200 → potentiostat</text>
      <text x="78" y="412" fill="#7bc639">✓ XS205 → balance</text>
      <text x="78" y="430" fill="#7bc639">✓ A221 → ph_meter</text>

      <!-- Phase header -->
      <text x="78" y="458" fill="#c8a96e" font-weight="700">━━ AI picking measurement</text>

      <!-- Plan -->
      <text x="78" y="480" fill="#fde68a">📁 Data folder:</text>
      <text x="90" y="494" fill="#fde68a">./data/2026-04-14_Fc_CV</text>

      <!-- Measurement -->
      <text x="78" y="522" fill="#c8a96e" font-weight="700">━━ Measurement running</text>
      <text x="78" y="544" fill="#fdba74">▶ Cycle 2 / 3 — sweep +0.42 V</text>

      <!-- Done -->
      <text x="78" y="572" fill="#c8a96e" font-weight="700">━━ Experiment complete!</text>
    </g>

    <!-- Right column: Cards -->
    <!-- Decision card -->
    <rect x="390" y="110" width="660" height="100" rx="8" fill="#151530" stroke="#c8a96e" stroke-width="0.8"/>
    <text x="408" y="135" font-family="'Palatino Linotype', Georgia, serif" font-size="14" font-weight="700" fill="#e8d5a0">🎯 AI Decision</text>
    <text x="408" y="158" font-family="'Segoe UI', Arial" font-size="12" fill="#e2e8f0">Measurement type: <tspan font-weight="700" fill="#c8a96e">Cyclic Voltammetry</tspan> (CV)</text>

    <!-- Reasoning block -->
    <rect x="408" y="170" width="624" height="32" rx="4" fill="rgba(200,130,255,0.10)" stroke="none"/>
    <rect x="408" y="170" width="3" height="32" fill="#c882ff"/>
    <text x="420" y="185" font-family="'Segoe UI', Arial" font-size="10" fill="#c4b5fd">Ferrocene in MeCN is the textbook one-electron reversible redox couple.</text>
    <text x="420" y="198" font-family="'Segoe UI', Arial" font-size="10" fill="#c4b5fd">Potentiostat + pH probe + balance match a standard CV setup from [1] Elgrishi 2018.</text>

    <!-- Measurement chart card -->
    <rect x="390" y="220" width="320" height="220" rx="8" fill="#151530" stroke="#c8a96e" stroke-width="0.8"/>
    <text x="408" y="245" font-family="'Palatino Linotype', Georgia, serif" font-size="13" font-weight="700" fill="#e8d5a0">📊 Measurement (live)</text>
    <!-- Progress bar -->
    <rect x="408" y="258" width="284" height="6" rx="3" fill="#0f0f1e" stroke="#c8a96e" stroke-width="0.6"/>
    <rect x="408" y="258" width="215" height="6" rx="3" fill="url(#gold)"/>
    <text x="692" y="263" text-anchor="end" font-family="'Segoe UI', Arial" font-size="9" fill="#94a3b8">76%</text>
    <!-- CV duck-shape curve -->
    <g transform="translate(408, 275)">
      <rect x="0" y="0" width="284" height="150" rx="4" fill="#0a0a15"/>
      <!-- Axes -->
      <line x1="20" y1="75" x2="272" y2="75" stroke="#334155" stroke-width="0.5"/>
      <line x1="146" y1="15" x2="146" y2="135" stroke="#334155" stroke-width="0.5"/>
      <!-- Forward sweep (anodic, positive current = oxidation peak) -->
      <path d="M 30 76 Q 60 76 90 74 Q 120 72 145 65 Q 170 50 185 32 Q 200 22 215 28 Q 240 45 265 72" fill="none" stroke="#c882ff" stroke-width="1.8"/>
      <!-- Reverse sweep (cathodic, negative current = reduction peak) -->
      <path d="M 265 78 Q 240 80 215 88 Q 200 108 185 118 Q 170 128 145 120 Q 120 105 90 82 Q 60 78 30 78" fill="none" stroke="#9cf0ff" stroke-width="1.8"/>
      <!-- Labels -->
      <text x="275" y="82" font-family="monospace" font-size="8" fill="#64748b" text-anchor="end">E (V)</text>
      <text x="152" y="22" font-family="monospace" font-size="8" fill="#64748b">i (μA)</text>
      <!-- Peak markers -->
      <circle cx="185" cy="32" r="2.5" fill="#fde68a"/>
      <text x="188" y="28" font-family="monospace" font-size="7" fill="#fde68a">Epa</text>
      <circle cx="185" cy="118" r="2.5" fill="#fde68a"/>
      <text x="188" y="128" font-family="monospace" font-size="7" fill="#fde68a">Epc</text>
    </g>

    <!-- Results card -->
    <rect x="720" y="220" width="310" height="220" rx="8" fill="#151530" stroke="#c8a96e" stroke-width="0.8"/>
    <text x="738" y="245" font-family="'Palatino Linotype', Georgia, serif" font-size="13" font-weight="700" fill="#e8d5a0">✨ Extracted Values</text>
    <g font-family="Courier, monospace" font-size="11">
      <text x="738" y="270" fill="#94a3b8">E_pa</text>
      <text x="1018" y="270" text-anchor="end" fill="#7bc639">= +0.415 V vs Fc/Fc⁺</text>
      <text x="738" y="290" fill="#94a3b8">E_pc</text>
      <text x="1018" y="290" text-anchor="end" fill="#7bc639">= +0.347 V vs Fc/Fc⁺</text>
      <text x="738" y="310" fill="#94a3b8">ΔE_p</text>
      <text x="1018" y="310" text-anchor="end" fill="#7bc639">= 68 mV  (~60 mV ideal)</text>
      <text x="738" y="330" fill="#94a3b8">i_pa / i_pc</text>
      <text x="1018" y="330" text-anchor="end" fill="#7bc639">= 1.02  (reversible)</text>
    </g>

    <!-- SIMULATED warning inside Results card -->
    <rect x="738" y="350" width="280" height="32" rx="4" fill="rgba(255,107,74,0.08)" stroke="#ff6b4a" stroke-width="0.6"/>
    <text x="748" y="370" font-family="'Segoe UI', Arial" font-size="10" fill="#ff6b4a">⚠ SIMULATED MODE — not real instrument data</text>

    <!-- AI Interpretation -->
    <rect x="390" y="450" width="640" height="140" rx="8" fill="#151530" stroke="#c8a96e" stroke-width="0.8"/>
    <text x="408" y="475" font-family="'Palatino Linotype', Georgia, serif" font-size="13" font-weight="700" fill="#e8d5a0">🧠 AI Interpretation <tspan font-size="10" font-weight="400" fill="#64748b">(cites papers by [N])</tspan></text>
    <g font-family="'Segoe UI', Arial" font-size="10.5">
      <text x="408" y="498" fill="#e2e8f0">ΔE_p = 68 mV and i_pa/i_pc ≈ 1 indicate a <tspan fill="#c4b5fd" font-weight="700">reversible one-electron</tspan></text>
      <text x="408" y="514" fill="#e2e8f0">transfer, consistent with Fc/Fc⁺ in acetonitrile as reported in <tspan fill="#c4b5fd" font-weight="700">[2]</tspan> Connelly 1996.</text>
      <text x="408" y="534" fill="#e2e8f0">Half-wave potential E_1/2 ≈ +0.38 V matches the accepted reference value.</text>
      <text x="408" y="554" fill="#e2e8f0">No resistive distortion observed. Recommend:</text>
      <text x="408" y="570" fill="#cbd5e1">  → Vary scan rate 25–500 mV/s to extract D via Randles–Ševčík <tspan fill="#c4b5fd" font-weight="700">[1]</tspan></text>
    </g>

    <!-- Open folder button -->
    <rect x="888" y="604" width="140" height="32" rx="6" fill="url(#gold)"/>
    <text x="958" y="625" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="700" fill="#0a0a15">📂 Open Data Folder</text>
  </g>
</svg>
