<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 545">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/><stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/><stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="wg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/><stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="wg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/><stop offset="100%" style="stop-color:#F87171"/>
    </linearGradient>
  </defs>

  <rect width="800" height="545" rx="12" fill="#F8FAFC"/>
  <text x="400" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#1E293B">How AI Harness for Lab Works</text>

  <!-- Step 1: User -->
  <circle cx="80" cy="110" r="35" fill="url(#wg1)"/>
  <text x="80" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="white">&#x1F9D1;</text>
  <text x="80" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#E0E7FF">Researcher</text>
  <text x="80" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748B" font-style="italic">"I want to measure</text>
  <text x="80" y="172" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748B" font-style="italic">IV on my sample"</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="110" x2="165" y2="110" stroke="#94A3B8" stroke-width="2"/>

  <!-- Step 2: Literature -->
  <rect x="175" y="75" width="110" height="70" rx="12" fill="url(#wg1)"/>
  <text x="230" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="white">&#x1F4DA;</text>
  <text x="230" y="118" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">Literature</text>
  <text x="230" y="133" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">Search protocols</text>

  <!-- Arrow 2 -->
  <line x1="290" y1="110" x2="335" y2="110" stroke="#94A3B8" stroke-width="2"/>

  <!-- Step 3: Discover -->
  <rect x="345" y="75" width="110" height="70" rx="12" fill="url(#wg2)"/>
  <text x="400" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="white">&#x1F50D;</text>
  <text x="400" y="118" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">Discover</text>
  <text x="400" y="133" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#A7F3D0">Scan instruments</text>

  <!-- Arrow 3 -->
  <line x1="460" y1="110" x2="505" y2="110" stroke="#94A3B8" stroke-width="2"/>

  <!-- Step 4: Plan -->
  <rect x="515" y="75" width="110" height="70" rx="12" fill="url(#wg1)"/>
  <text x="570" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="white">&#x1F4CB;</text>
  <text x="570" y="118" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">Plan + Validate</text>
  <text x="570" y="133" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">Safety boundaries</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="110" x2="675" y2="110" stroke="#94A3B8" stroke-width="2"/>

  <!-- Step 5: Analyze -->
  <rect x="685" y="75" width="95" height="70" rx="12" fill="url(#wg3)"/>
  <text x="732" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="white">&#x1F4CA;</text>
  <text x="732" y="118" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="white">Analyze</text>
  <text x="732" y="133" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#FDE68A">AI interprets data</text>

  <!-- Features row -->
  <rect x="30" y="195" width="740" height="75" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="50" y="208" width="160" height="48" rx="8" fill="#EEF2FF"/>
  <text x="130" y="228" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#4338CA">Model Agnostic</text>
  <text x="130" y="244" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#6366F1">Claude, GPT, Ollama, vLLM</text>

  <rect x="230" y="208" width="160" height="48" rx="8" fill="#ECFDF5"/>
  <text x="310" y="228" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#065F46">Safety First</text>
  <text x="310" y="244" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#059669">3-tier boundary validation</text>

  <rect x="410" y="208" width="160" height="48" rx="8" fill="#FFF7ED"/>
  <text x="490" y="228" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#92400E">Learn from History</text>
  <text x="490" y="244" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#D97706">Experiment memory</text>

  <rect x="590" y="208" width="160" height="48" rx="8" fill="#FEF2F2"/>
  <text x="670" y="228" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#991B1B">Extensible</text>
  <text x="670" y="244" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#DC2626">AI generates new protocols</text>

  <!-- Disciplines section -->
  <text x="400" y="305" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#1E293B">46 Templates Across 9 Disciplines</text>

  <!-- Discipline cards - Row 1 -->
  <rect x="30" y="318" width="240" height="56" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="0.8"/>
  <text x="40" y="338" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#4338CA">&#x26A1; Electrical (7)</text>
  <text x="40" y="354" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">IV, R-T, Delta Mode, High R,</text>
  <text x="40" y="366" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">FET Transfer/Output, Breakdown</text>

  <rect x="280" y="318" width="240" height="56" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="0.8"/>
  <text x="290" y="338" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#5B21B6">&#x1F9F2; Magnetic (8)</text>
  <text x="290" y="354" font-family="Segoe UI, Arial" font-size="8" fill="#7C3AED">AHE, MR, SOT, Hall, FMR,</text>
  <text x="290" y="366" font-family="Segoe UI, Arial" font-size="8" fill="#7C3AED">Hysteresis, Magnetostriction, Nernst</text>

  <rect x="530" y="318" width="240" height="56" rx="8" fill="#FFF7ED" stroke="#FDE68A" stroke-width="0.8"/>
  <text x="540" y="338" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#92400E">&#x1F4A1; Semiconductor (5)</text>
  <text x="540" y="354" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">Solar Cell IV, DLTS, Photocurrent,</text>
  <text x="540" y="366" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">Photoresponse, Tunneling</text>

  <!-- Discipline cards - Row 2 -->
  <rect x="30" y="382" width="240" height="56" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="0.8"/>
  <text x="40" y="402" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#065F46">&#x1F9EA; Electrochemistry (4)</text>
  <text x="40" y="418" font-family="Segoe UI, Arial" font-size="8" fill="#059669">Cyclic Voltammetry, EIS,</text>
  <text x="40" y="430" font-family="Segoe UI, Arial" font-size="8" fill="#059669">Chronoamperometry, Potentiometry</text>

  <rect x="280" y="382" width="240" height="56" rx="8" fill="#FDF2F8" stroke="#FBCFE8" stroke-width="0.8"/>
  <text x="290" y="402" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#9D174D">&#x1F50B; Dielectric (4)</text>
  <text x="290" y="418" font-family="Segoe UI, Arial" font-size="8" fill="#DB2777">C-V, P-E Loop, Pyroelectric,</text>
  <text x="290" y="430" font-family="Segoe UI, Arial" font-size="8" fill="#DB2777">Capacitance-Frequency</text>

  <rect x="530" y="382" width="240" height="56" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.8"/>
  <text x="540" y="402" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#991B1B">&#x2744; Superconductivity (2)</text>
  <text x="540" y="418" font-family="Segoe UI, Arial" font-size="8" fill="#DC2626">Tc Transition, Critical</text>
  <text x="540" y="430" font-family="Segoe UI, Arial" font-size="8" fill="#DC2626">Current Density (Jc)</text>

  <!-- Discipline cards - Row 3 -->
  <rect x="30" y="446" width="240" height="56" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.8"/>
  <text x="40" y="466" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#854D0E">&#x1F321; Thermoelectric (2)</text>
  <text x="40" y="482" font-family="Segoe UI, Arial" font-size="8" fill="#CA8A04">Seebeck Coefficient,</text>
  <text x="40" y="494" font-family="Segoe UI, Arial" font-size="8" fill="#CA8A04">Thermal Conductivity</text>

  <rect x="280" y="446" width="240" height="56" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.8"/>
  <text x="290" y="466" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#166534">&#x1F9EC; Sensors &amp; Materials (7)</text>
  <text x="290" y="482" font-family="Segoe UI, Arial" font-size="8" fill="#16A34A">Gas, Humidity, Biosensor, pH,</text>
  <text x="290" y="494" font-family="Segoe UI, Arial" font-size="8" fill="#16A34A">Cell Counting, Strain, Fatigue</text>

  <rect x="530" y="446" width="240" height="56" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.8"/>
  <text x="540" y="466" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="#1E40AF">&#x1F527; Quantum Design (6)</text>
  <text x="540" y="482" font-family="Segoe UI, Arial" font-size="8" fill="#3B82F6">PPMS R-T/MR/Hall/Hc,</text>
  <text x="540" y="494" font-family="Segoe UI, Arial" font-size="8" fill="#3B82F6">MPMS M-H, MPMS M-T ZFC/FC</text>

  <!-- Tagline -->
  <text x="400" y="532" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94A3B8">From research question to publication-ready data — guided by AI at every step</text>
</svg>
