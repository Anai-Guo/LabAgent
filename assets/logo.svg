<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="16" fill="#0F172A"/>

  <!-- AI Brain icon -->
  <g transform="translate(40, 40)">
    <!-- Brain outline -->
    <path d="M60 20 C40 20 25 35 25 55 C25 65 30 73 37 78 L37 95 C37 100 41 105 47 105 L73 105 C79 105 83 100 83 95 L83 78 C90 73 95 65 95 55 C95 35 80 20 60 20Z" fill="none" stroke="url(#grad1)" stroke-width="3"/>
    <!-- Neural connections -->
    <circle cx="48" cy="45" r="4" fill="#818CF8"/>
    <circle cx="72" cy="45" r="4" fill="#818CF8"/>
    <circle cx="60" cy="60" r="4" fill="#A78BFA"/>
    <circle cx="45" cy="70" r="3" fill="#C4B5FD"/>
    <circle cx="75" cy="70" r="3" fill="#C4B5FD"/>
    <line x1="48" y1="45" x2="60" y2="60" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
    <line x1="72" y1="45" x2="60" y2="60" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="60" x2="45" y2="70" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="60" x2="75" y2="70" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="45" x2="72" y2="45" stroke="#818CF8" stroke-width="1" opacity="0.4"/>
    <!-- Pulse line below -->
    <polyline points="30,115 42,115 46,105 50,125 54,100 58,120 62,110 66,115 83,115" fill="none" stroke="url(#grad2)" stroke-width="2.5"/>
  </g>

  <!-- Text -->
  <text x="170" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="white">
    <tspan fill="url(#grad1)">AI</tspan> Harness
  </text>
  <text x="170" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="300" fill="#94A3B8">
    for Lab
  </text>
  <text x="170" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748B">
    AI-guided laboratory automation for physics measurements
  </text>
</svg>
