<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="40%" style="stop-color:#0f1a3a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9963A"/>
      <stop offset="50%" style="stop-color:#F2D06B"/>
      <stop offset="100%" style="stop-color:#C9963A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#B565E0;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#B565E0;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#72D5F2;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#72D5F2;stop-opacity:0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="900" height="300" rx="16" fill="url(#sky)"/>

  <!-- Ambient glow -->
  <circle cx="300" cy="80" r="200" fill="url(#glow1)"/>
  <circle cx="650" cy="180" r="180" fill="url(#glow2)"/>

  <!-- Stars -->
  <g fill="#F2D06B" filter="url(#starGlow)">
    <circle cx="95" cy="30" r="1.2" opacity="0.8"/>
    <circle cx="210" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="330" cy="22" r="1" opacity="0.7"/>
    <circle cx="470" cy="15" r="1.3" opacity="0.6"/>
    <circle cx="560" cy="38" r="0.8" opacity="0.9"/>
    <circle cx="680" cy="28" r="1.1" opacity="0.5"/>
    <circle cx="790" cy="42" r="0.9" opacity="0.7"/>
    <circle cx="850" cy="20" r="0.6" opacity="0.4"/>
    <circle cx="150" cy="55" r="0.5" opacity="0.6"/>
    <circle cx="730" cy="52" r="0.7" opacity="0.8"/>
  </g>

  <!-- Top gold line -->
  <rect x="0" y="0" width="900" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.5"/>

  <!-- Diamond ornaments -->
  <g transform="translate(130, 120) rotate(45)" opacity="0.1" stroke="#F2D06B" stroke-width="1" fill="none">
    <rect x="-10" y="-10" width="20" height="20" rx="2"/>
  </g>
  <g transform="translate(770, 120) rotate(45)" opacity="0.1" stroke="#F2D06B" stroke-width="1" fill="none">
    <rect x="-10" y="-10" width="20" height="20" rx="2"/>
  </g>

  <!-- Main Title -->
  <text x="450" y="100" text-anchor="middle" font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="76" font-weight="700" fill="url(#gold)" letter-spacing="4">
    LabAgent
  </text>

  <!-- Subtitle -->
  <text x="450" y="132" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8B8FAE" letter-spacing="5">
    YOUR AI-POWERED LAB ASSISTANT
  </text>

  <!-- Ornament divider -->
  <g transform="translate(450, 152)" opacity="0.25">
    <line x1="-100" y1="0" x2="-12" y2="0" stroke="#C9963A" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="100" y2="0" stroke="#C9963A" stroke-width="0.8"/>
    <rect x="-4" y="-4" width="8" height="8" rx="1" fill="none" stroke="#F2D06B" stroke-width="0.8" transform="rotate(45 0 0)"/>
  </g>

  <!-- Feature badges -->
  <g transform="translate(0, 175)">
    <g transform="translate(75, 0)">
      <circle cx="18" cy="14" r="13" fill="rgba(181,101,224,0.12)" stroke="#B565E0" stroke-width="0.7"/>
      <text x="18" y="18" text-anchor="middle" font-size="11" fill="#D4A0F5">&#x26A1;</text>
      <text x="45" y="18" font-family="'Segoe UI', Arial" font-size="12" fill="#C4B5FD">46 Templates</text>
    </g>
    <g transform="translate(225, 0)">
      <circle cx="18" cy="14" r="13" fill="rgba(95,189,67,0.1)" stroke="#5FBD43" stroke-width="0.7"/>
      <text x="18" y="18" text-anchor="middle" font-size="11" fill="#86E065">&#x25C9;</text>
      <text x="45" y="18" font-family="'Segoe UI', Arial" font-size="12" fill="#86EFAC">9 Disciplines</text>
    </g>
    <g transform="translate(375, 0)">
      <circle cx="18" cy="14" r="13" fill="rgba(239,121,56,0.1)" stroke="#EF7938" stroke-width="0.7"/>
      <text x="18" y="18" text-anchor="middle" font-size="11" fill="#FBA56A">&#x25B2;</text>
      <text x="45" y="18" font-family="'Segoe UI', Arial" font-size="12" fill="#FDBA74">Agent Panel</text>
    </g>
    <g transform="translate(525, 0)">
      <circle cx="18" cy="14" r="13" fill="rgba(114,213,242,0.08)" stroke="#72D5F2" stroke-width="0.7"/>
      <text x="18" y="18" text-anchor="middle" font-size="11" fill="#72D5F2">&#x2736;</text>
      <text x="45" y="18" font-family="'Segoe UI', Arial" font-size="12" fill="#7DD3FC">6 AI Models</text>
    </g>
    <g transform="translate(675, 0)">
      <circle cx="18" cy="14" r="13" fill="rgba(242,208,107,0.08)" stroke="#F2D06B" stroke-width="0.7"/>
      <text x="18" y="18" text-anchor="middle" font-size="11" fill="#F2D06B">&#x25C6;</text>
      <text x="45" y="18" font-family="'Segoe UI', Arial" font-size="12" fill="#FDE68A">Safety First</text>
    </g>
  </g>

  <!-- Simulated + Real modes badge -->
  <g transform="translate(450, 215)">
    <rect x="-85" y="-11" width="170" height="22" rx="11" fill="rgba(114,213,242,0.08)" stroke="#72D5F2" stroke-width="0.7" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" fill="#7DD3FC" letter-spacing="1.5">SIMULATED + REAL MODES</text>
  </g>

  <!-- Tagline -->
  <text x="450" y="248" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif" font-size="13" fill="#6B7280" font-style="italic">
    From research question to publication-ready data — guided by AI at every step
  </text>

  <!-- Bottom gold line -->
  <rect x="0" y="297" width="900" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.35"/>
</svg>
