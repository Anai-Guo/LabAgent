<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/><stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/><stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="hg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/><stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <linearGradient id="hgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/><stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="16" fill="url(#hgBg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818CF8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/><line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/><line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/><line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
  </g>

  <!-- Glow effect behind title -->
  <ellipse cx="400" cy="85" rx="250" ry="60" fill="#6366F1" opacity="0.06"/>

  <!-- Main title -->
  <text x="400" y="75" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    <tspan fill="#A78BFA">AI</tspan> Harness
  </text>
  <text x="400" y="110" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="300" fill="#64748B" letter-spacing="1">
    for Lab
  </text>

  <!-- Slogan bar -->
  <rect x="225" y="128" width="350" height="34" rx="17" fill="url(#hg3)"/>
  <text x="400" y="151" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="3">
    FULLY AUTOMATED LAB ASSISTANT
  </text>

  <!-- Feature pills row -->
  <g transform="translate(0, 185)">
    <rect x="108" y="0" width="90" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="#6366F1" stroke-width="0.8"/>
    <text x="153" y="17" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#A78BFA">AI Analysis</text>

    <rect x="213" y="0" width="100" height="26" rx="13" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="0.8"/>
    <text x="263" y="17" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#34D399">Auto Discovery</text>

    <rect x="328" y="0" width="90" height="26" rx="13" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="0.8"/>
    <text x="373" y="17" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#FCD34D">Safety First</text>

    <rect x="433" y="0" width="90" height="26" rx="13" fill="rgba(239,68,68,0.12)" stroke="#EF4444" stroke-width="0.8"/>
    <text x="478" y="17" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#FCA5A5">6 AI Models</text>

    <rect x="538" y="0" width="95" height="26" rx="13" fill="rgba(6,182,212,0.12)" stroke="#06B6D4" stroke-width="0.8"/>
    <text x="585" y="17" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#67E8F9">Lab Memory</text>
  </g>

  <!-- Tagline -->
  <text x="400" y="248" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#475569">
    From research question to publication-ready data — guided by AI at every step
  </text>
</svg>
