    <text x="100" y="38" font-family="Segoe UI" font-size="9" fill="#64748b">Ω</text>
  </g>
  <g transform="translate(545, 105)">
    <rect width="110" height="55" rx="6" fill="#151530" stroke="#2a2a55" stroke-width="0.8"/>
    <rect width="3" height="55" rx="1.5" fill="#f0b232"/>
