    <text x="14" y="38" font-family="Courier" font-size="18" font-weight="700" fill="#7bc639">938.3<tspan font-size="10">μ</tspan></text>
    <text x="100" y="38" font-family="Segoe UI" font-size="9" fill="#64748b">A</text>
  </g>
  <g transform="translate(425, 105)">
