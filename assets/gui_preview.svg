  <text x="375" y="89" font-family="Segoe UI" font-size="9" fill="#64748b">▼</text>

  <rect x="405" y="76" width="80" height="18" rx="4" fill="#c8a96e" opacity="0.15" stroke="#c8a96e" stroke-width="0.8"/>
