  <rect x="30" y="370" width="230" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="395" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="600" fill="#1E293B">Interfaces</text>
  <rect x="50" y="405" width="80" height="35" rx="6" fill="#DBEAFE"/>
  <text x="90" y="427" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1E40AF">MCP Server</text>
  <rect x="145" y="405" width="55" height="35" rx="6" fill="#DBEAFE"/>
  <text x="172" y="427" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1E40AF">CLI</text>
  <rect x="50" y="450" width="80" height="35" rx="6" fill="#DBEAFE"/>
  <text x="90" y="472" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1E40AF">Agent Chat</text>
  <rect x="145" y="450" width="55" height="35" rx="6" fill="#DBEAFE"/>
  <text x="172" y="472" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1E40AF">API</text>

  <!-- Bottom: Instruments -->
  <rect x="285" y="370" width="230" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="395" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="600" fill="#1E293B">Instruments</text>
  <text x="310" y="418" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Keithley 2400 / 2000 / 6221</text>
  <text x="310" y="435" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Keithley 2182A / 6517B</text>
  <text x="310" y="452" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Lakeshore 425 / 335 / 350</text>
  <text x="310" y="469" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Keysight E4980A LCR</text>
  <text x="310" y="486" font-family="Segoe UI, Arial" font-size="9" fill="#475569">NI USB-6351 DAQ</text>

  <!-- Bottom: AI Models -->
  <rect x="540" y="370" width="230" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="395" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="600" fill="#1E293B">AI Models</text>
  <text x="565" y="418" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Claude Sonnet 4 (Best quality)</text>
  <text x="565" y="435" font-family="Segoe UI, Arial" font-size="9" fill="#475569">GPT-4o / GPT-4o-mini</text>
  <text x="565" y="452" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Qwen3 32B (Local/Ollama)</text>
  <text x="565" y="469" font-family="Segoe UI, Arial" font-size="9" fill="#475569">Llama 3.3 70B (Local)</text>
  <text x="565" y="486" font-family="Segoe UI, Arial" font-size="9" fill="#475569">DeepSeek / Gemini Flash</text>

  <!-- AI badge -->
  <rect x="50" y="270" width="16" height="16" rx="3" fill="#4F46E5" opacity="0.15"/>
  <text x="58" y="282" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#4F46E5">AI</text>
</svg>
