<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="hw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="data" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#F8FAFC"/>
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#1E293B">AI Harness for Lab - Architecture</text>

  <!-- Phase boxes -->
  <!-- Phase -1: Model Router -->
  <rect x="30" y="60" width="140" height="70" rx="10" fill="url(#ai)" filter="url(#shadow)"/>
  <text x="100" y="88" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="white">Phase -1</text>
  <text x="100" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#E0E7FF">Model Router</text>
  <text x="100" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">Claude / GPT / Ollama</text>

  <!-- Phase 0: Literature -->
  <rect x="190" y="60" width="140" height="70" rx="10" fill="url(#ai)" filter="url(#shadow)"/>
  <text x="260" y="88" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="white">Phase 0</text>
  <text x="260" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#E0E7FF">Literature Search</text>
  <text x="260" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">paper-pilot MCP</text>

  <!-- Phase 1: Discovery -->
  <rect x="350" y="60" width="140" height="70" rx="10" fill="url(#hw)" filter="url(#shadow)"/>
  <text x="420" y="88" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="white">Phase 1</text>
  <text x="420" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#D1FAE5">Equipment Discovery</text>
  <text x="420" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#A7F3D0">GPIB / USB / Serial</text>

  <!-- Phase 2: Classification -->
  <rect x="510" y="60" width="140" height="70" rx="10" fill="url(#ai)" filter="url(#shadow)"/>
  <text x="580" y="88" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="white">Phase 2</text>
  <text x="580" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#E0E7FF">AI Classification</text>
  <text x="580" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">Dict + LLM fallback</text>

  <!-- Phase 3: Planning -->
  <rect x="670" y="60" width="110" height="70" rx="10" fill="url(#ai)" filter="url(#shadow)"/>
  <text x="725" y="88" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="600" fill="white">Phase 3</text>
  <text x="725" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#E0E7FF">Plan + Safety</text>
  <text x="725" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#C7D2FE">3-tier boundary</text>

  <!-- Arrows between phases -->
  <path d="M170 95 L185 95" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M330 95 L345 95" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M490 95 L505 95" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M650 95 L665 95" fill="none" stroke="#94A3B8" stroke-width="2"/>

  <!-- Middle section: Core Modules -->
  <rect x="30" y="160" width="740" height="180" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="185" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="600" fill="#1E293B">Core Modules</text>

  <!-- Module boxes -->
  <rect x="50" y="200" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="100" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">Agent Loop</text>
  <text x="100" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Tool calling</text>
  <text x="100" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Budget mgmt</text>

  <rect x="165" y="200" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="215" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">Skills</text>
  <text x="215" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Protocol registry</text>
  <text x="215" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">AI generation</text>

  <rect x="280" y="200" width="100" height="55" rx="8" fill="#ECFDF5"/>
  <text x="330" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#065F46">Discovery</text>
  <text x="330" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#059669">VISA scanner</text>
  <text x="330" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#059669">AI classifier</text>

  <rect x="395" y="200" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="445" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">Planning</text>
  <text x="445" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Templates + AI</text>
  <text x="445" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Safety advisor</text>

  <rect x="510" y="200" width="100" height="55" rx="8" fill="#FFF7ED"/>
  <text x="560" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#92400E">Analysis</text>
  <text x="560" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">Template + AI gen</text>
  <text x="560" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">AI interpretation</text>

  <rect x="625" y="200" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="675" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">Memory</text>
  <text x="675" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">SQLite + FTS5</text>
  <text x="675" y="250" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Frozen snapshots</text>

  <!-- Second row of modules -->
  <rect x="50" y="270" width="100" height="55" rx="8" fill="#ECFDF5"/>
  <text x="100" y="292" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#065F46">Reference</text>
  <text x="100" y="310" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#059669">PICA scripts</text>
  <text x="100" y="320" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#059669">SCPI sequences</text>

  <rect x="165" y="270" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="215" y="292" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">Literature</text>
  <text x="215" y="310" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">paper-pilot MCP</text>
  <text x="215" y="320" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">Protocol search</text>

  <rect x="280" y="270" width="100" height="55" rx="8" fill="#EEF2FF"/>
  <text x="330" y="292" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#4338CA">LLM Router</text>
  <text x="330" y="310" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">litellm unified</text>
  <text x="330" y="320" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#6366F1">6 providers</text>

  <rect x="395" y="270" width="100" height="55" rx="8" fill="#FFF7ED"/>
  <text x="445" y="292" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" font-weight="600" fill="#92400E">Models</text>
  <text x="445" y="310" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">Pydantic schemas</text>
  <text x="445" y="320" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#D97706">Safety policies</text>

