    capabilities: ["drive_laser_diode", "tec_control", "modulation_input"]

  thorlabs_mdt693b:
    models: ["MDT693B", "MDT694B"]
    vendor: "thorlabs"
    roles: ["piezo_controller"]
    capabilities: ["piezo_position", "hv_output"]
    typical_limits:
      max_voltage_v: 150.0

  # ──────────────────────── Spectrometers ─────────────────────────────

  ocean_insight_usb2000:
