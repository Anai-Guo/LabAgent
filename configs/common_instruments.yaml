# Lab Harness - Common Instrument Database
# Maps instrument models to their capabilities and typical roles.
#
# Coverage spans electrical, optical, electrochemical, biological, thermal,
# and environmental instruments across major manufacturers. When you meet an
# instrument not listed here, ask your AI to run the `manual_lookup` harness
# tool FIRST — never guess SCPI commands.
#
# Each entry lists: model variants, vendor, which measurement roles it fills,
# a short capability vocabulary, typical absolute limits (when known), and
# links to the programming manual / open-source driver.

instruments:
  # ───────────────────────── Source / Measure ─────────────────────────

  keithley_2400:
    models: ["2400", "2410", "2420", "2440"]
    vendor: "keithley"
    roles: ["source_meter"]
    capabilities: ["source_i", "source_v", "measure_i", "measure_v"]
    typical_limits:
      max_current_a: 1.05
      max_voltage_v: 210.0
    manual: "https://www.tek.com/en/manual/2400-series-user-s-manual"
    driver: "pymeasure.instruments.keithley.Keithley2400"

  keithley_2000:
    models: ["2000", "2001", "2002"]
    vendor: "keithley"
    roles: ["dmm"]
    capabilities: ["measure_v", "measure_r", "measure_i"]
    manual: "https://www.tek.com/en/manual/2000-series-user-s-manual"

  keithley_2182:
    models: ["2182", "2182A"]
    vendor: "keithley"
    roles: ["nanovoltmeter"]
    capabilities: ["measure_v_low_noise"]
    notes: "Often paired with 6221 for delta-mode low-resistance measurements"

  keithley_6221:
    models: ["6221"]
    vendor: "keithley"
    roles: ["ac_current_source"]
    capabilities: ["source_i_dc", "source_i_pulse", "source_i_ac"]
    typical_limits:
      max_current_a: 0.105

  keithley_6517:
    models: ["6517", "6517A", "6517B"]
    vendor: "keithley"
    roles: ["electrometer"]
    capabilities: ["measure_r_high", "measure_i_low", "source_v"]

  # ───────────────────────── DC Power Supplies ────────────────────────

  keysight_e36313a:
    models: ["E36313A", "E36312A", "E36311A"]
    vendor: "keysight"
    roles: ["power_supply_dc"]
    capabilities: ["source_v", "source_i", "programmable_ramp", "multi_channel"]
    typical_limits:
      max_voltage_v: 30.0
      max_current_a: 10.0
    manual: "https://www.keysight.com/us/en/assets/9018-04588/user-manuals/9018-04588.pdf"

  rigol_dp832a:
    models: ["DP832A", "DP832", "DP831A"]
    vendor: "rigol"
    roles: ["power_supply_dc"]
    capabilities: ["source_v", "source_i", "multi_channel"]
    typical_limits:
      max_voltage_v: 30.0
      max_current_a: 3.0

  # ─────────────────────────── Oscilloscopes ──────────────────────────

  tektronix_tds3054c:
    models: ["TDS3054C", "TDS3052C", "TDS3014C"]
    vendor: "tektronix"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform", "measure_rise_time", "measure_frequency"]
    manual: "https://www.tek.com/en/manual/tds3000-series-programmer-manual"

  tektronix_mso44:
    models: ["MSO44", "MSO46", "MSO58"]
    vendor: "tektronix"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform", "mixed_signal", "bus_decode"]

  keysight_dsox1204g:
    models: ["DSOX1204G", "DSOX1202G"]
    vendor: "keysight"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform", "measure_rise_time"]
    manual: "https://www.keysight.com/us/en/assets/9018-07252/programming-guides/9018-07252.pdf"

  keysight_msox3054t:
    models: ["MSOX3054T", "MSOX3034T", "MSOX3024T"]
    vendor: "keysight"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform", "mixed_signal", "waveform_math"]

  rigol_ds1054z:
    models: ["DS1054Z", "DS1104Z", "DS1074Z"]
    vendor: "rigol"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform"]
    notes: "Budget-friendly; popular for teaching labs"

  rigol_mso5354:
    models: ["MSO5354", "MSO5204", "MSO5104"]
    vendor: "rigol"
    roles: ["oscilloscope"]
    capabilities: ["capture_waveform", "mixed_signal"]

  # ──────────────────────── Function Generators ───────────────────────

  keysight_33622a:
    models: ["33622A", "33612A", "33500B", "33522B"]
    vendor: "keysight"
    roles: ["function_generator"]
    capabilities: ["awg", "arbitrary_waveform", "modulation"]
    typical_limits:
      max_frequency_hz: 120e6
      max_amplitude_vpp: 20.0

  tektronix_afg1062:
    models: ["AFG1062", "AFG1022"]
    vendor: "tektronix"
    roles: ["function_generator"]
    capabilities: ["awg", "arbitrary_waveform"]

  tektronix_afg3102:
    models: ["AFG3102", "AFG3252", "AFG3152"]
    vendor: "tektronix"
    roles: ["function_generator"]
    capabilities: ["awg", "arbitrary_waveform", "modulation"]

  rigol_dg1032z:
    models: ["DG1032Z", "DG1022Z"]
    vendor: "rigol"
    roles: ["function_generator"]
    capabilities: ["awg", "arbitrary_waveform"]

  # ───────────────────────── Lock-in Amplifiers ───────────────────────

  srs_sr830:
    models: ["SR830", "SR810"]
    vendor: "srs"
    roles: ["lockin_amplifier"]
    capabilities: ["phase_sensitive_detection", "lock_in"]
    notes: "Classic lock-in; widely used for AC transport, small-signal detection"
    manual: "https://www.thinksrs.com/downloads/pdfs/manuals/SR830m.pdf"

  srs_sr860:
    models: ["SR860", "SR865A"]
    vendor: "srs"
    roles: ["lockin_amplifier"]
    capabilities: ["phase_sensitive_detection", "lock_in", "frequency_response"]

  zurich_mfli:
    models: ["MFLI", "MFLI-500K", "MFLI-5M"]
    vendor: "zurich_instruments"
    roles: ["lockin_amplifier"]
    capabilities: ["phase_sensitive_detection", "demodulation", "frequency_response"]
    driver: "zhinst-toolkit"
    manual: "https://docs.zhinst.com/"

  zurich_hf2li:
    models: ["HF2LI"]
    vendor: "zurich_instruments"
    roles: ["lockin_amplifier"]
    capabilities: ["phase_sensitive_detection", "demodulation", "dual_harmonic"]

  # ───────────────────── Spectrum / Network Analyzers ─────────────────

  keysight_n9320b:
    models: ["N9320B", "N9000B", "N9010B"]
    vendor: "keysight"
    roles: ["spectrum_analyzer"]
    capabilities: ["rf_spectrum", "measure_power", "emc_pre_compliance"]

  rs_fsv:
    models: ["FSV", "FSV4", "FSV7"]
    vendor: "rohde_schwarz"
    roles: ["spectrum_analyzer"]
    capabilities: ["rf_spectrum", "measure_power", "signal_analysis"]

  keysight_e5071c:
    models: ["E5071C", "E5063A"]
    vendor: "keysight"
