    vendor: "thermo_fisher"
    roles: ["ph_meter"]
    capabilities: ["measure_ph", "measure_ise", "measure_mv"]

  # ─────────────────── Gas / Vacuum / Flow control ────────────────────

  alicat_mc_series:
