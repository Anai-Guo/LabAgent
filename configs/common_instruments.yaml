  molecular_devices_spectramax:
    models: ["SPECTRAMAX M5", "SPECTRAMAX ID5"]
    vendor: "molecular_devices"
    roles: ["plate_reader"]
    capabilities: ["absorbance", "fluorescence", "luminescence"]

  # ───────────────────────── Balance / pH ─────────────────────────────

  mettler_xs_series:
    models: ["XS205", "XP105", "XS204"]
    vendor: "mettler_toledo"
    roles: ["balance"]
