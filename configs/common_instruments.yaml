    capabilities: ["measure_sparam", "network_analysis"]

  # ───────────────────────── LCR / Impedance ──────────────────────────

  keysight_e4980:
    models: ["E4980", "E4980A", "E4980AL"]
    vendor: "keysight"
    roles: ["lcr_meter"]
    capabilities: ["measure_c", "measure_z", "measure_r"]
    frequency_range: "20 Hz - 2 MHz"

  # ─────────────────── Lake Shore (cryo / magnetics) ──────────────────

  lakeshore_425:
    models: ["425", "455", "475"]
    vendor: "lakeshore"
    roles: ["gaussmeter"]
    capabilities: ["measure_field"]

  lakeshore_335:
    models: ["335", "336", "340", "350"]
    vendor: "lakeshore"
