    capabilities: ["measure_temp", "control_temp", "control_heater"]

  oxford_mercury_itc:
    models: ["MERCURY ITC"]
    vendor: "oxford_instruments"
    roles: ["temp_controller_cryo"]
    capabilities: ["cryogenic_temp_control", "heater_output", "multi_channel"]
    notes: "Cryostat temperature controller; SCPI over TCP and GPIB"

  # ───────────────────────── Optics / Photonics ───────────────────────

  thorlabs_pm100d:
    models: ["PM100D", "PM400", "PM100USB"]
    vendor: "thorlabs"
    roles: ["optical_power_meter"]
    capabilities: ["measure_optical_power", "wavelength_correction"]
